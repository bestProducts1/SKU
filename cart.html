<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shopping Cart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <style>
      :root {
        --primary: #10b981;
        --primary-hover: #059669;
        --background: #f9fafb;
        --surface: #ffffff;
        --text: #111827;
        --text-secondary: #4b5563;
        --border: #e5e7eb;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--background);
        color: var(--text);
      }
    </style>
  </head>
  <body class="pb-32">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-50">
      <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
        <a href="index.html" class="flex items-center text-gray-600 hover:text-emerald-600 transition-colors">
          <i class="fa-solid fa-arrow-left text-lg mr-2"></i>
          <span class="font-medium">Continue Shopping</span>
        </a>
        <h1 class="text-xl font-bold text-gray-800">Shopping Cart</h1>
        <button id="clear-cart-btn" class="text-sm font-medium text-red-500 hover:text-red-700 transition-colors flex items-center">
          <i class="fa-solid fa-trash-can mr-1.5"></i> Clear All
        </button>
      </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-6">
      <div id="cart-items-container" class="space-y-4">
        </div>

      <div id="empty-cart-state" class="hidden py-16 text-center">
        <div class="w-24 h-24 bg-gray-100 rounded-full flex items-center justify-content-center mx-auto mb-4">
          <i class="fa-solid fa-basket-shopping text-4xl text-gray-400"></i>
        </div>
        <h3 class="text-lg font-medium text-gray-900 mb-1">Your cart is empty</h3>
        <p class="text-gray-500 mb-6 text-sm">Add some products from the shop to view them here.</p>
        <a href="index.html" class="inline-flex items-center justify-content-center px-5 py-2.5 bg-emerald-600 hover:bg-emerald-700 text-white font-medium rounded-xl shadow-sm transition-colors">
          Go To Shop
        </a>
      </div>

      <div id="order-preview-section" class="mt-8 bg-white border border-gray-200 rounded-2xl p-5 shadow-sm">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-md font-semibold text-gray-800 flex items-center">
            <i class="fa-solid fa-file-text text-emerald-600 mr-2"></i> Order Preview
          </h2>
          <button id="copy-order-btn" class="inline-flex items-center px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white text-sm font-medium rounded-xl shadow-sm transition-all active:scale-95">
            <i class="fa-solid fa-copy mr-1.5"></i> Copy Order
          </button>
        </div>
        <textarea id="order-preview-text" readonly rows="8" class="w-full bg-gray-50 border border-gray-200 rounded-xl p-4 text-sm font-mono text-gray-700 focus:outline-none resize-none"></textarea>
      </div>
    </main>

    <div id="checkout-bar" class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 shadow-xl z-40">
      <div class="max-w-4xl mx-auto px-4 h-20 flex items-center justify-between">
        <div>
          <p id="total-qty-display" class="text-lg font-bold text-gray-900 flex items-center">
            0 <span>items</span>
          </p>
          <p class="text-xs text-gray-500 mt-0.5">Estimated shipping included</p>
        </div>
        <button id="whatsapp-checkout-btn" class="inline-flex items-center justify-content-center px-6 h-12 bg-[#25D366] hover:bg-[#20ba5a] text-white font-medium rounded-xl shadow-md transition-all active:scale-95">
          <i class="fa-brands fa-whatsapp text-xl mr-2"></i> Checkout via WhatsApp
        </button>
      </div>
    </div>

    <script>
      let cartItems = [];
      const cartItemsContainer = document.getElementById("cart-items-container");
      const emptyCartState = document.getElementById("empty-cart-state");
      const orderPreviewSection = document.getElementById("order-preview-section");
      const checkoutBar = document.getElementById("checkout-bar");
      const totalQtyDisplay = document.getElementById("total-qty-display");
      const previewTextarea = document.getElementById("order-preview-text");
      const copyOrderBtn = document.getElementById("copy-order-btn");
      const whatsappCheckoutBtn = document.getElementById("whatsapp-checkout-btn");
      const clearCartBtn = document.getElementById("clear-cart-btn");

      // Load cart from LocalStorage
      function loadCartFromLocalStorage() {
        try {
          const stored = localStorage.getItem("perfume_cart");
          cartItems = stored ? JSON.parse(stored) : [];
        } catch (e) {
          console.error("Error reading cart from localStorage", e);
          cartItems = [];
        }
      }

      // Save cart to LocalStorage
      function saveCartToLocalStorage() {
        localStorage.setItem("perfume_cart", JSON.stringify(cartItems));
      }

      // 【核心修改】计算含有精密运费规则和谷歌表格人民币成本的财务对账刷新逻辑
      function updatePageState() {
        const totalQty = cartItems.reduce((sum, item) => sum + item.quantity, 0);

        // 1. 初始化财务对账数据
        let totalWeight = 0;
        let totalRmbCost = 0; // 总成本（人民币）

        cartItems.forEach((item) => {
          // 智能判定是否为套盒（标题包含“套盒”或“Set”）
          const isSet = item.caption && (item.caption.includes("套盒") || item.caption.includes("Set"));
          
          // 严格执行你的重量规则：套盒 4 磅，普通香水 1.2 磅
          if (isSet) {
            totalWeight += 4 * item.quantity;
          } else {
            totalWeight += 1.2 * item.quantity; 
          }

          // 自动从你的谷歌表格里抓取表头叫 cost 的拿货价属性（乘以对应的加购数量）
          const unitCost = Number(item.cost) || 0;
          totalRmbCost += unitCost * item.quantity;
        });

        // 2. 智能判定物流单号数量（超过40发2个，超过80发3个）
        let trackingNumCount = 1;
        if (totalQty > 80) {
          trackingNumCount = 3;
        } else if (totalQty > 40) {
          trackingNumCount = 2;
        }

        // 3. 严格执行最新的核心物流计费规则（首3磅固定 $11，续磅每磅加 $1）
        let baseShipping = 0;
        if (totalWeight > 0) {
          let roundedWeight = Math.ceil(totalWeight); // 货代传统：不足1磅按1磅算（向上取整）
          
          if (roundedWeight <= 3) {
            baseShipping = 11; // 1-3 磅统一收 $11
          } else if (roundedWeight <= 20) {
            baseShipping = 11 + (roundedWeight - 3) * 1; // 4-20 磅，每多1磅加$1
          } else {
            baseShipping = 28 + (roundedWeight - 20) * 1; // 超过20 磅的冗余防呆防断档安全公式
          }
        }

        // 4. 精算仓库代发费用（首支操作费 $0.8，续支手续费 $0.3，1支包装费 $0.7，2支及以上包装费 $1.5）
        let warehouseFee = 0;
        if (totalQty > 0) {
          warehouseFee += 0.8 + (totalQty - 1) * 0.3;
          warehouseFee += (totalQty === 1) ? 0.7 : 1.5;
        }

        // 最终总运费 = 纯物流费 + 仓库代发费
        const totalUsdShipping = baseShipping + warehouseFee;

        // 5. 让红框处高亮完美显示这一单独享的财务对账数据
        let financeNotice = ` | 💰 成本: ¥${totalRmbCost.toFixed(2)} | 🚚 运费: $${totalUsdShipping.toFixed(2)} (${trackingNumCount}个单号)`;
        totalQtyDisplay.innerHTML = `${totalQty} <span>items</span> <span style="font-size:0.85rem; color:#ff9800; margin-left:8px; font-weight:bold;">${financeNotice}</span>`;

        // 6. 同步给预览区和复制按钮
        const orderText = generateOrderString(totalRmbCost, totalUsdShipping, trackingNumCount);
        previewTextarea.value = orderText;
      }

      // 【核心修改】同步让一键复制出来的订单数据最底下追加一行财务痕迹
      function generateOrderString(rmbCost, usdShipping, trackingCount) {
        if (cartItems.length === 0) return "";

        // 保持你要求的纯净换行格式，没有任何加号和多余干扰
        const itemLines = cartItems.map((item) => {
          const displayName = item.sku || item.name;
          return `${displayName}*${item.quantity}`;
        });

        let resultText = itemLines.join("\n");

        // 在末尾另起一行追加内部专属财务对账尾巴
        resultText += `\n\n[财务对账：成本 ¥${rmbCost.toFixed(1)} / 运费 $${usdShipping.toFixed(1)} / 单号 ${trackingCount}个]`;
        
        return resultText;
      }

      // Render Cart UI List
      function renderCart() {
        if (cartItems.length === 0) {
          cartItemsContainer.innerHTML = "";
          emptyCartState.classList.remove("hidden");
          orderPreviewSection.classList.add("hidden");
          checkoutBar.classList.add("hidden");
          clearCartBtn.classList.add("hidden");
          return;
        }

        emptyCartState.classList.add("hidden");
        orderPreviewSection.classList.remove("hidden");
        checkoutBar.classList.remove("hidden");
        clearCartBtn.classList.remove("hidden");

        let html = "";
        cartItems.forEach((item, index) => {
          html += `
            <div class="bg-white border border-gray-200 rounded-2xl p-4 flex items-center justify-between shadow-sm">
              <div class="flex items-center space-x-4">
                <img src="${item.img || 'placeholder.jpg'}" alt="${item.name}" class="w-16 h-16 object-contain rounded-xl bg-gray-50 border border-gray-100 p-1" onerror="this.src='https://placehold.co/100x100?text=Perfume'">
                <div>
                  <h3 class="font-bold text-gray-900 text-sm md:text-base">${item.sku || item.name}</h3>
                  <p class="text-xs text-gray-500 mt-0.5 line-clamp-1">${item.caption || ''}</p>
                </div>
              </div>
              <div class="flex items-center space-x-4">
                <div class="flex items-center bg-gray-50 border border-gray-200 rounded-xl px-1 py-1">
                  <button onclick="changeQty(${index}, -1)" class="w-8 h-8 flex items-center justify-content-center text-gray-500 hover:text-emerald-600 transition-colors rounded-lg hover:bg-white">
                    <i class="fa-solid fa-minus text-xs"></i>
                  </button>
                  <span class="w-8 text-center font-semibold text-sm text-gray-800">${item.quantity}</span>
                  <button onclick="changeQty(${index}, 1)" class="w-8 h-8 flex items-center justify-content-center text-gray-500 hover:text-emerald-600 transition-colors rounded-lg hover:bg-white">
                    <i class="fa-solid fa-plus text-xs"></i>
                  </button>
                </div>
                <button onclick="removeItem(${index})" class="text-gray-400 hover:text-red-500 transition-colors p-2">
                  <i class="fa-solid fa-trash-can"></i>
                </button>
              </div>
            </div>
          `;
        });

        cartItemsContainer.innerHTML = html;
        updatePageState();
      }

      // Quantity adjustments
      window.changeQty = function(index, change) {
        cartItems[index].quantity += change;
        if (cartItems[index].quantity <= 0) {
          cartItems.splice(index, 1);
        }
        saveCartToLocalStorage();
        renderCart();
      };

      // Remove specific item
      window.removeItem = function(index) {
        cartItems.splice(index, 1);
        saveCartToLocalStorage();
        renderCart();
      };

      // Clear all items
      clearCartBtn.addEventListener("click", () => {
        if (confirm("Are you sure you want to clear your entire cart?")) {
          cartItems = [];
          saveCartToLocalStorage();
          renderCart();
        }
      });

      // Copy Order function
      copyOrderBtn.addEventListener("click", () => {
        previewTextarea.select();
        previewTextarea.setSelectionRange(0, 99999);
        try {
          document.execCommand("copy");
          const originalText = copyOrderBtn.innerHTML;
          copyOrderBtn.innerHTML = `<i class="fa-solid fa-check mr-1.5"></i> Copied!`;
          copyOrderBtn.classList.remove("bg-emerald-600", "hover:bg-emerald-700");
          copyOrderBtn.classList.add("bg-gray-800");
          setTimeout(() => {
            copyOrderBtn.innerHTML = originalText;
            copyOrderBtn.classList.add("bg-emerald-600", "hover:bg-emerald-700");
            copyOrderBtn.classList.remove("bg-gray-800");
          }, 2000);
        } catch (err) {
          alert("Failed to copy order text.");
        }
      });

      // Checkout via WhatsApp
      whatsappCheckoutBtn.addEventListener("click", () => {
        const orderStr = previewTextarea.value;
        if (!orderStr) return;
        const encodedText = encodeURIComponent(orderStr);
        // Using your hardcoded WhatsApp number channel
        window.open(`https://wa.me/19092497184?text=${encodedText}`, "_blank");
      });

      // Init Load
      loadCartFromLocalStorage();
      renderCart();
    </script>
  </body>
</html>
